<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Guerra - Gremio WSB</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Fondo de Agua Animada */
        body { 
            margin: 0; padding: 0; 
            background-color: #00121a;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'); /* Textura sutil */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1200px; /* Necesario para el efecto 3D */
        }

        /* Animación del Agua de fondo */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background: url('https://img.freepik.com/vector-gratis/patron-ondas-agua-azul-estilo-plano_23-2147710313.jpg?size=626&ext=jpg');
            background-repeat: repeat;
            opacity: 0.1;
            animation: oleaje 60s linear infinite;
            z-index: -1;
        }

        @keyframes oleaje {
            from { transform: translate(0, 0); }
            to { transform: translate(-50%, -50%); }
        }

        /* Contenedor del Mapa con inclinación 3D */
        #map-container {
            width: 90vw;
            height: 85vh;
            transform: rotateX(20deg) rotateZ(-1deg); /* Aquí controlas la inclinación */
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            border: 10px solid #3d2b1f;
            border-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            background: #1a1a1a;
            overflow: hidden;
            transition: transform 0.5s ease;
        }

        #map { height: 100%; width: 100%; background: transparent; }

        /* Panel UI */
        .ui-panel {
            position: absolute; top: 20px; right: 20px; z-index: 2000;
            background: rgba(20, 15, 5, 0.9); border: 2px solid #b8860b;
            padding: 15px; border-radius: 5px; color: #f1c40f; font-family: 'Courier New', monospace;
        }

        .boton-ui {
            background: #332b1a; color: #f1c40f; border: 1px solid #b8860b;
            padding: 8px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold;
        }

        /* Ajuste para que los Popups no salgan inclinados (opcional) */
        .leaflet-popup-content-wrapper { transform: rotateX(-10deg); }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div style="text-align:center; font-weight:bold; border-bottom: 1px solid #b8860b; margin-bottom:10px;">CARTA NÁUTICA</div>
        <button class="boton-ui" onclick="borrarTodo()">LIMPIAR MAPA</button>
        <div id="coordenadas" style="font-size: 10px; margin-top:10px; text-align:center;">X: 0 | Y: 0</div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { crs: L.CRS.Simple, minZoom: -1 });
        var bounds = [[0, 0], [1500, 2000]];
        L.imageOverlay('mapa_juego.jpg', bounds).addTo(map);
        map.fitBounds(bounds);

        // --- CATALOGO DE ICONOS ---
        // Aquí es donde agregarás tu pack de iconos más adelante
        var catalogo = {
            puerto: { n: "Puerto Aliado", i: "https://cdn-icons-png.flaticon.com/512/2942/2942023.png" },
            fuerte: { n: "Fuerte Militar", i: "https://cdn-icons-png.flaticon.com/512/3233/3233857.png" },
            pirata: { n: "Base Pirata", i: "https://cdn-icons-png.flaticon.com/512/10563/10563236.png" },
            peligro: { n: "Zona de Peligro", i: "https://cdn-icons-png.flaticon.com/512/564/564619.png" }
        };

        var misPuntos = JSON.parse(localStorage.getItem('mapa_wsb_v3')) || [];

        function renderizar() {
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
            misPuntos.forEach((p, idx) => {
                var icono = L.icon({ iconUrl: catalogo[p.t].i, iconSize: [32, 32], iconAnchor: [16, 32] });
                L.marker(p.l, {icon: icono, draggable: true}).addTo(map)
                .bindPopup(`<b>${p.n}</b><br><button onclick="eliminar(${idx})">Eliminar</button>`)
                .on('dragend', function(e) {
                    misPuntos[idx].l = e.target.getLatLng();
                    localStorage.setItem('mapa_wsb_v3', JSON.stringify(misPuntos));
                });
            });
        }

        map.on('contextmenu', e => {
            var html = `<b>Añadir objeto:</b><br>`;
            for(var k in catalogo) {
                html += `<button onclick="crear('${k}',${e.latlng.lat},${e.latlng.lng})" style="width:100%; margin:2px 0; cursor:pointer;">${catalogo[k].n}</button>`;
            }
            L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
        });

        function crear(t, lat, lng) {
            var n = prompt("Nombre del sitio:", catalogo[t].n);
            if(n) {
                misPuntos.push({l:[lat,lng], t:t, n:n});
                localStorage.setItem('mapa_wsb_v3', JSON.stringify(misPuntos));
                renderizar();
            }
            map.closePopup();
        }

        function eliminar(id) {
            misPuntos.splice(id, 1);
            localStorage.setItem('mapa_wsb_v3', JSON.stringify(misPuntos));
            renderizar();
        }

        function borrarTodo() {
            if(confirm("¿Resetear mapa?")) { misPuntos = []; localStorage.removeItem('mapa_wsb_v3'); renderizar(); }
        }

        map.on('mousemove', e => {
            document.getElementById('coordenadas').innerHTML = `X: ${e.latlng.lat.toFixed(0)} | Y: ${e.latlng.lng.toFixed(0)}`;
        });

        renderizar();
    </script>
</body>
</html>
