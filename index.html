<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño Visual - Gremio WSB</title>
    <style>
        /* 1. EL OCEANO (Fondo animado) */
        body {
            margin: 0; padding: 0;
            background-color: #000b1a;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        .ocean {
            position: fixed; width: 200%; height: 200%;
            background: radial-gradient(circle, #002d4d 0%, #000b1a 80%);
            z-index: -1;
        }

        /* Animación de brillo de agua */
        .ocean::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            opacity: 0.2; animation: moveWater 40s linear infinite;
        }

        @keyframes moveWater {
            from { transform: translate(0, 0); }
            to { transform: translate(-50px, -50px); }
        }

        /* 2. ESCENA 3D (El espacio donde vive la mesa) */
        .scene {
            perspective: 1200px; /* Esto da la profundidad */
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
        }

        /* 3. LA MESA DE MADERA */
        .table {
            width: 85vw; height: 80vh;
            background: #2c1e16; /* Color madera oscura */
            border: 15px solid #3d2b1f; /* Marco de la mesa */
            box-shadow: 
                0 50px 100px rgba(0,0,0,0.8), /* Sombra proyectada en el suelo */
                inset 0 0 40px rgba(0,0,0,0.7); /* Sombra interna */
            
            /* INCLINACIÓN AGRESIVA */
            transform: rotateX(30deg) rotateY(0deg) rotateZ(-1deg);
            transform-style: preserve-3d;
            position: relative;
            transition: transform 0.5s ease;
        }

        /* 4. EL MAPA (Tu asset principal) */
        .map-asset {
            width: 100%; height: 100%;
            background-image: url('mapa_juego.jpg'); /* Tu imagen */
            background-size: cover;
            background-position: center;
            opacity: 0.9;
            filter: sepia(0.2) contrast(1.1); /* Efecto papel antiguo */
        }

        /* 5. INTERFAZ DE USUARIO (UI) */
        /* La UI NO debe estar inclinada para que sea fácil de leer */
        .ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Deja pasar los clics al fondo */
            z-index: 100;
        }

        .panel {
            position: absolute; top: 20px; right: 20px;
            width: 220px; background: rgba(20, 15, 10, 0.95);
            border: 2px solid #b8860b; padding: 15px;
            color: #f1c40f; pointer-events: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .panel-header {
            text-align: center; font-weight: bold; border-bottom: 2px dashed #b8860b;
            margin-bottom: 15px; padding-bottom: 5px; font-size: 14px;
        }

        .btn {
            background: #332b1a; color: #f1c40f; border: 1px solid #b8860b;
            width: 100%; padding: 8px; margin-bottom: 8px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; font-size: 11px;
        }

        .btn:hover { background: #f1c40f; color: #000; }

        .coords-display {
            font-size: 10px; color: #888; text-align: center; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="ocean"></div>

    <div class="scene">
        <div class="table" id="mainTable">
            <div class="map-asset"></div>
            </div>
    </div>

    <div class="ui-layer">
        <div class="panel">
            <div class="panel-header">⚓ CARTOGRAFÍA WSB</div>
            <button class="btn">Nuevo Marcador</button>
            <button class="btn">Exportar Log</button>
            <button class="btn" style="border-color: #ff4d4d; color: #ff4d4d;">Limpiar Mapa</button>
            
            <div class="coords-display">
                LAT: 0.00 | LNG: 0.00
            </div>
        </div>
    </div>

</body>
</html>
