<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Estratégico - Gremio WSB</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin:0;
    background:#0d0d0d;
    font-family:Courier New;
    color:#f1c40f;
}

#map {
    height:100vh;
}

.ui-panel{
    position:absolute;
    right:10px;
    top:10px;
    z-index:1000;
    background:#111;
    border:2px solid #f1c40f;
    padding:15px;
    width:260px;
    border-radius:8px;
}

.section-title{
    border-bottom:1px solid #f1c40f;
    margin-bottom:8px;
    font-size:13px;
    font-weight:bold;
}

.boton-ui{
    background:transparent;
    color:#f1c40f;
    border:1px solid #f1c40f;
    padding:5px;
    width:100%;
    margin-bottom:6px;
    cursor:pointer;
}

.boton-ui:hover{
    background:#f1c40f;
    color:black;
}

select,input,textarea{
    width:100%;
    margin-bottom:5px;
    background:#000;
    color:#f1c40f;
    border:1px solid #444;
    padding:3px;
    font-size:11px;
}

.barco-rotable{
    transition: transform 0.05s linear;
    transform-origin: center center;
}
</style>
</head>
<body>

<div class="ui-panel">

<div class="section-title">⚓ MODO</div>
<button class="boton-ui" onclick="togglePersonal()">Mostrar/Ocultar Personal</button>
<button class="boton-ui" onclick="activarModoRuta()">Modo Ruta</button>
<button class="boton-ui" onclick="guardarRutaActual()">Guardar Ruta</button>
<button class="boton-ui" onclick="animarUltimaRuta()">Animar Última Ruta</button>
<button class="boton-ui" onclick="exportarDatos()">Exportar Local</button>
<button class="boton-ui" onclick="resetPersonal()" style="color:#e74c3c;border-color:#e74c3c;">Reset Personal</button>

<div class="section-title" style="margin-top:10px;">🗺 CREAR MARCA</div>

<select id="tipoIcono">
<option value="port">Puerto</option>
<option value="city">Ciudad</option>
<option value="fort">Fuerte</option>
<option value="bay">Bahía</option>
<option value="farm">Granja</option>
<option value="iron">Hierro</option>
<option value="wood">Madera</option>
<option value="rum">Ron</option>
<option value="water">Agua</option>
</select>

<input type="text" id="nombre" placeholder="Nombre">
<input type="number" id="compra" placeholder="Precio Compra">
<input type="number" id="venta" placeholder="Precio Venta">

<select id="riesgo">
<option>Bajo</option>
<option>Medio</option>
<option>Alto</option>
</select>

<textarea id="nota" rows="3" placeholder="Notas..."></textarea>

<p style="font-size:10px;">Click derecho en el mapa para colocar</p>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ======================
// CONFIG MAPA
// ======================

var map = L.map('map',{
    crs:L.CRS.Simple,
    minZoom:-1,
    attributionControl:false,
    doubleClickZoom:false
});

var bounds=[[0,0],[1500,2000]];
L.imageOverlay('mapa_juego.jpg',bounds).addTo(map);
map.fitBounds(bounds);

var capaPersonal=L.layerGroup().addTo(map);
var capaRutas=L.layerGroup().addTo(map);

// ======================
// ICONOS
// ======================

var iconos={
    port:'assets/iconos/port.png',
    city:'assets/iconos/city.png',
    fort:'assets/iconos/fort.png',
    bay:'assets/iconos/bay.png',
    farm:'assets/iconos/farm.png',
    iron:'assets/iconos/iron.png',
    wood:'assets/iconos/wood.png',
    rum:'assets/iconos/rum.png',
    water:'assets/iconos/water.png'
};

// ======================
// STORAGE
// ======================

var datosPersonal=JSON.parse(localStorage.getItem('wsb_personal_v2'))||[];
var rutasPersonal=JSON.parse(localStorage.getItem('wsb_rutas_v2'))||[];

function guardar(){
    localStorage.setItem('wsb_personal_v2',JSON.stringify(datosPersonal));
    localStorage.setItem('wsb_rutas_v2',JSON.stringify(rutasPersonal));
}

// ======================
// MARCAS
// ======================

function dibujarMarca(data,index){

    var icono=L.icon({
        iconUrl:iconos[data.tipo],
        iconSize:[30,30],
        iconAnchor:[15,30]
    });

    var marker=L.marker(data.latlng,{icon:icono,draggable:true}).addTo(capaPersonal);

    marker.bindPopup(`
        <b>${data.nombre}</b><br>
        Compra: ${data.compra||"-"}<br>
        Venta: ${data.venta||"-"}<br>
        Riesgo: ${data.riesgo}<br>
        ${data.nota||""}
        <br><br>
        <button onclick="borrarMarca(${index})">BORRAR</button>
    `);

    marker.on("dragend",function(){
        datosPersonal[index].latlng=marker.getLatLng();
        guardar();
    });
}

function borrarMarca(i){
    datosPersonal.splice(i,1);
    guardar();
    location.reload();
}

map.on("contextmenu",function(e){

    var data={
        tipo:document.getElementById("tipoIcono").value,
        nombre:document.getElementById("nombre").value||"Sin Nombre",
        compra:document.getElementById("compra").value,
        venta:document.getElementById("venta").value,
        riesgo:document.getElementById("riesgo").value,
        nota:document.getElementById("nota").value,
        latlng:e.latlng
    };

    datosPersonal.push(data);
    guardar();
    dibujarMarca(data,datosPersonal.length-1);
});

// ======================
// RUTAS
// ======================

// ======================
// RUTAS (VERSIÓN CORREGIDA)
// ======================

var modoRuta = false;
var rutaActual = [];
var polyActual = null;

function activarModoRuta(){
    modoRuta = true;
    rutaActual = [];
    
    if(polyActual){
        capaRutas.removeLayer(polyActual);
        polyActual = null;
    }

    alert("Modo Ruta ACTIVADO - Haz click para marcar puntos");
}

map.on("click", function(e){

    if(!modoRuta) return;

    rutaActual.push(e.latlng);

    if(polyActual){
        capaRutas.removeLayer(polyActual);
    }

    polyActual = L.polyline(rutaActual, {
        color: 'cyan',
        weight: 3
    }).addTo(capaRutas);
});

function guardarRutaActual(){

    if(!modoRuta){
        alert("Activa primero el Modo Ruta");
        return;
    }

    if(rutaActual.length < 2){
        alert("Necesitas al menos 2 puntos");
        return;
    }

    // Copia profunda real
    let copiaRuta = rutaActual.map(p => ({lat: p.lat, lng: p.lng}));

    rutasPersonal.push(copiaRuta);

    guardar();

    console.log("Ruta guardada:", rutasPersonal);

    alert("Ruta guardada correctamente");

    // Reset
    modoRuta = false;
    rutaActual = [];
    polyActual = null;
}

// Dibujar rutas guardadas al iniciar
rutasPersonal.forEach(r => {

    let reconstruida = r.map(p => L.latLng(p.lat, p.lng));

    L.polyline(reconstruida, {
        color:'cyan',
        weight:3
    }).addTo(capaRutas);
});

// ======================
// SUAVIZAR RUTA
// ======================

function suavizarRuta(puntos){
    let nueva=[];
    for(let i=0;i<puntos.length-1;i++){
        let p1=puntos[i];
        let p2=puntos[i+1];
        for(let t=0;t<=1;t+=0.03){
            nueva.push(L.latLng(
                p1.lat+(p2.lat-p1.lat)*t,
                p1.lng+(p2.lng-p1.lng)*t
            ));
        }
    }
    return nueva;
}

// ======================
// ANIMACION BARCO
// ======================

// ======================
// ANIMACION NAVAL PRO
// ======================

// ======================
// ANIMACION NAVAL FLOW REAL
// ======================

var barcoAnimado = null;
var animacionActiva = false;

function animarRuta(ruta){

    if(barcoAnimado){
        map.removeLayer(barcoAnimado);
    }

    animacionActiva = true;

    let rutaSuave = suavizarRuta(ruta);

    if(rutaSuave.length < 2) return;

    let barcoIcon = L.icon({
        iconUrl:'assets/iconos/ship.png',
        iconSize:[40,40],
        iconAnchor:[20,20],
        className:'barco-rotable'
    });

    barcoAnimado = L.marker(rutaSuave[0],{
        icon:barcoIcon
    }).addTo(map);

    let progreso = 0;
    let velocidad = 0.001;
    let tiempo = 0;

    function animar(){

        if(!animacionActiva) return;

        progreso += velocidad;

        if(progreso >= 1){
            progreso = 0; // loop infinito limpio
        }

        let total = rutaSuave.length - 1;
        let posicionReal = progreso * total;

        let index = Math.floor(posicionReal);
        let t = posicionReal - index;

        let p1 = rutaSuave[index];
        let p2 = rutaSuave[index + 1];

        if(!p2) return;

        let lat = p1.lat + (p2.lat - p1.lat) * t;
        let lng = p1.lng + (p2.lng - p1.lng) * t;

        barcoAnimado.setLatLng([lat, lng]);

        // Rotación
        let dx = p2.lng - p1.lng;
        let dy = p2.lat - p1.lat;
        let angulo = Math.atan2(dy, dx) * 180 / Math.PI;

        // Balanceo cartoon suave
        tiempo += 0.05;
        let balanceo = Math.sin(tiempo) * 6;

        let iconElement = barcoAnimado.getElement();
        if(iconElement){
            iconElement.style.transform =
                `rotate(${angulo + balanceo}deg)`;
        }

        requestAnimationFrame(animar);
    }

    requestAnimationFrame(animar);
}

function animarUltimaRuta(){

    if(rutasPersonal.length === 0){
        alert("No hay rutas guardadas");
        return;
    }

    let rutaRaw = rutasPersonal[rutasPersonal.length - 1];

    let rutaConvertida = rutaRaw.map(p => L.latLng(p.lat, p.lng));

    animarRuta(rutaConvertida);
}

// ======================
// EXPORTAR
// ======================

function exportarDatos(){
    var data={marcas:datosPersonal,rutas:rutasPersonal};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="mapa_personal_wsb.json";
    a.click();
}

// ======================
// UTILIDADES
// ======================

function togglePersonal(){
    if(map.hasLayer(capaPersonal)) map.removeLayer(capaPersonal);
    else map.addLayer(capaPersonal);
}

function resetPersonal(){
    if(confirm("Seguro?")){
        localStorage.clear();
        location.reload();
    }
}

// ======================
// CARGA INICIAL
// ======================

datosPersonal.forEach((d,i)=>dibujarMarca(d,i));

</script>
</body>
</html>
