<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Estratégico - Gremio WSB</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin:0;
    background:#0d0d0d;
    font-family:Courier New;
    color:#f1c40f;
}

#map {
    height:100vh;
}

.ui-panel{
    position:absolute;
    right:10px;
    top:10px;
    z-index:1000;
    background:#111;
    border:2px solid #f1c40f;
    padding:15px;
    width:260px;
    border-radius:8px;
}

.section-title{
    border-bottom:1px solid #f1c40f;
    margin-bottom:8px;
    font-size:13px;
    font-weight:bold;
}

.boton-ui{
    background:transparent;
    color:#f1c40f;
    border:1px solid #f1c40f;
    padding:5px;
    width:100%;
    margin-bottom:6px;
    cursor:pointer;
}

.boton-ui:hover{
    background:#f1c40f;
    color:black;
}

select,input,textarea{
    width:100%;
    margin-bottom:5px;
    background:#000;
    color:#f1c40f;
    border:1px solid #444;
    padding:3px;
    font-size:11px;
}
</style>
</head>
<body>

<div class="ui-panel">

<div class="section-title">👤 USUARIO</div>
<input type="text" id="usuario" placeholder="Nombre de Usuario" onchange="cambiarUsuario()">
<p style="font-size:10px;">Cambia para cargar datos personales</p>

<div class="section-title">⚓ MODO</div>
<button class="boton-ui" onclick="togglePersonal()">Mostrar/Ocultar Personal</button>
<button class="boton-ui" onclick="marcarPosicionActual()">Marcar Posición Actual</button>
<button class="boton-ui" onclick="activarModoZona()">Modo Zona Peligrosa</button>
<button class="boton-ui" onclick="guardarZonaActual()">Guardar Zona</button>
<button class="boton-ui" onclick="calcularGanancia()">Calcular Ganancia</button>
<button class="boton-ui" onclick="planificarRutaOptima()">Planificar Ruta Óptima</button>
<button class="boton-ui" onclick="rutaSegura()">Planificar Ruta Segura</button>
<button class="boton-ui" onclick="calcularTiempo()">Calcular Tiempo de Viaje</button>
<button class="boton-ui" onclick="exportarDatos()">Exportar Local</button>
<button class="boton-ui" onclick="resetPersonal()" style="color:#e74c3c;border-color:#e74c3c;">Reset Personal</button>

<div class="section-title" style="margin-top:10px;">🗺 CREAR MARCA</div>

<select id="tipoIcono">
<option value="port">Puerto</option>
<option value="city">Ciudad</option>
<option value="fort">Fuerte</option>
<option value="bay">Bahía</option>
<option value="farm">Granja</option>
<option value="iron">Hierro</option>
<option value="wood">Madera</option>
<option value="rum">Ron</option>
<option value="water">Agua</option>
<option value="pirate">Zona Pirata</option>
<option value="danger">Zona Peligrosa</option>
<option value="storm">Tormenta</option>
</select>

<input type="text" id="nombre" placeholder="Nombre">
<input type="number" id="compra" placeholder="Precio Compra">
<input type="number" id="venta" placeholder="Precio Venta">

<select id="riesgo">
<option>Bajo</option>
<option>Medio</option>
<option>Alto</option>
</select>

<textarea id="nota" rows="3" placeholder="Notas..."></textarea>

<p style="font-size:10px;">Click derecho en el mapa para colocar</p>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-curve@0.7.0/src/leaflet-curve.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script>

// ======================
// USUARIO
// ======================

var usuarioActual = localStorage.getItem('wsb_usuario') || 'default';
var posicionActual = JSON.parse(localStorage.getItem('wsb_' + usuarioActual + '_posicion')) || null;

function cambiarUsuario(){
    usuarioActual = document.getElementById('usuario').value || 'default';
    localStorage.setItem('wsb_usuario', usuarioActual);
    location.reload(); // Recargar para cargar datos del nuevo usuario
}

function marcarPosicionActual(){
    // Pedir al usuario hacer click en el mapa para marcar posición
    alert("Haz click en el mapa para marcar tu posición actual");
    map.once('click', function(e){
        posicionActual = {lat: e.latlng.lat, lng: e.latlng.lng};
        localStorage.setItem('wsb_' + usuarioActual + '_posicion', JSON.stringify(posicionActual));
        
        // Dibujar marcador de posición actual
        if(window.marcadorPosicion){
            map.removeLayer(window.marcadorPosicion);
        }
        window.marcadorPosicion = L.marker(posicionActual, {
            icon: L.icon({
                iconUrl: 'assets/iconos/ship.png', // Asumir icono de barco
                iconSize: [30,30],
                iconAnchor: [15,15]
            })
        }).addTo(map).bindPopup("Tu Posición Actual");
        
        alert("Posición actual marcada");
    });
}

document.getElementById('usuario').value = usuarioActual;

var map = L.map('map',{
    crs:L.CRS.Simple,
    minZoom:-1,
    attributionControl:false,
    doubleClickZoom:false
});

var bounds=[[0,0],[1500,2000]];
L.imageOverlay('mapa_juego.jpg',bounds).addTo(map);
map.fitBounds(bounds);

var capaPersonal=L.layerGroup().addTo(map);
var capaRutas=L.layerGroup().addTo(map);
var capaZonas=L.layerGroup().addTo(map);

// ======================
// ICONOS
// ======================

var iconos={
    port:'assets/iconos/port.png',
    city:'assets/iconos/city.png',
    fort:'assets/iconos/fort.png',
    bay:'assets/iconos/bay.png',
    farm:'assets/iconos/farm.png',
    iron:'assets/iconos/iron.png',
    wood:'assets/iconos/wood.png',
    rum:'assets/iconos/rum.png',
    water:'assets/iconos/water.png',
    pirate:'assets/iconos/pirate.png',
    danger:'assets/iconos/danger.png',
    storm:'assets/iconos/storm.png'
};

// ======================
// STORAGE
// ======================

var datosPersonal=JSON.parse(localStorage.getItem('wsb_' + usuarioActual + '_personal_v2'))||[];
var rutasPersonal=JSON.parse(localStorage.getItem('wsb_' + usuarioActual + '_rutas_v2'))||[];
var zonasPersonal=JSON.parse(localStorage.getItem('wsb_' + usuarioActual + '_zonas_v2'))||[];

function guardar(){
    localStorage.setItem('wsb_' + usuarioActual + '_personal_v2',JSON.stringify(datosPersonal));
    localStorage.setItem('wsb_' + usuarioActual + '_rutas_v2',JSON.stringify(rutasPersonal));
    localStorage.setItem('wsb_' + usuarioActual + '_zonas_v2',JSON.stringify(zonasPersonal));
}

// ======================
// MARCAS
// ======================

function dibujarMarca(data,index){

    var icono=L.icon({
        iconUrl:iconos[data.tipo],
        iconSize:[30,30],
        iconAnchor:[15,30]
    });

    var marker=L.marker(data.latlng,{icon:icono,draggable:true}).addTo(capaPersonal);

    marker.bindPopup(`
        <b>${data.nombre}</b><br>
        Compra: ${data.compra||"-"}<br>
        Venta: ${data.venta||"-"}<br>
        Riesgo: ${data.riesgo}<br>
        ${data.nota||""}
        <br><br>
        <button onclick="borrarMarca(${index})">BORRAR</button>
    `);

    marker.on("dragend",function(){
        datosPersonal[index].latlng=marker.getLatLng();
        guardar();
    });
}

function borrarMarca(i){
    datosPersonal.splice(i,1);
    guardar();
    location.reload();
}

map.on("contextmenu",function(e){

    var data={
        tipo:document.getElementById("tipoIcono").value,
        nombre:document.getElementById("nombre").value||"Sin Nombre",
        compra:document.getElementById("compra").value,
        venta:document.getElementById("venta").value,
        riesgo:document.getElementById("riesgo").value,
        nota:document.getElementById("nota").value,
        latlng:e.latlng
    };

    datosPersonal.push(data);
    guardar();
    dibujarMarca(data,datosPersonal.length-1);
});

// ======================
// RUTAS
// ======================

var modoRuta = false;
var rutaActual = [];
var polyActual = null;
var modoZona = false;
var zonaActual = [];
var polyZonaActual = null;

function activarModoZona(){
    modoZona = true;
    zonaActual = [];
    
    if(polyZonaActual){
        capaZonas.removeLayer(polyZonaActual);
        polyZonaActual = null;
    }

    alert("Modo Zona Peligrosa ACTIVADO - Haz click para marcar puntos del área");
}

map.on("click", function(e){

    if(modoRuta){
        rutaActual.push(e.latlng);

        if(polyActual){
            capaRutas.removeLayer(polyActual);
        }

        polyActual = L.polyline(rutaActual, {
            color: 'cyan',
            weight: 3
        }).addTo(capaRutas);
    } else if(modoZona){
        zonaActual.push(e.latlng);

        if(polyZonaActual){
            capaZonas.removeLayer(polyZonaActual);
        }

        polyZonaActual = L.polygon(zonaActual, {
            color: 'red',
            weight: 2,
            fillColor: 'red',
            fillOpacity: 0.3
        }).addTo(capaZonas);
    }
});

function guardarZonaActual(){

    if(!modoZona){
        alert("Activa primero el Modo Zona Peligrosa");
        return;
    }

    if(zonaActual.length < 3){
        alert("Necesitas al menos 3 puntos para un área");
        return;
    }

    let copiaZona = zonaActual.map(p => ({lat: p.lat, lng: p.lng}));
    zonasPersonal.push(copiaZona);
    guardar();

    // Dibujar zona guardada
    L.polygon(copiaZona, {
        color: 'red',
        weight: 2,
        fillColor: 'red',
        fillOpacity: 0.3
    }).addTo(capaZonas);

    alert("Zona peligrosa guardada");

    // Reset
    modoZona = false;
    zonaActual = [];
    polyZonaActual = null;
}

// Dibujar rutas guardadas al iniciar
let rutasDibujadas = [];
rutasPersonal.forEach((r, index) => {
    let reconstruida = r.map(p => L.latLng(p.lat, p.lng));
    let rutaLayer;
    if(reconstruida.length >= 3){
        // Usar curva Bézier simple
        rutaLayer = L.curve(['M', reconstruida[0], 'Q', reconstruida[1], reconstruida[2]], {
            color:'cyan',
            weight:3
        }).addTo(capaRutas);
    } else {
        rutaLayer = L.polyline(reconstruida, {
            color:'cyan',
            weight:3
        }).addTo(capaRutas);
    }
    rutasDibujadas.push(rutaLayer);
});

// Dibujar zonas guardadas al iniciar
zonasPersonal.forEach(z => {
    let reconstruida = z.map(p => L.latLng(p.lat, p.lng));
    L.polygon(reconstruida, {
        color: 'red',
        weight: 2,
        fillColor: 'red',
        fillOpacity: 0.3
    }).addTo(capaZonas);
});

// Dibujar posición actual si existe
if(posicionActual){
    window.marcadorPosicion = L.marker(posicionActual, {
        icon: L.icon({
            iconUrl: 'assets/iconos/ship.png',
            iconSize: [30,30],
            iconAnchor: [15,15]
        })
    }).addTo(map).bindPopup("Tu Posición Actual");
}

// ======================
// SUAVIZAR RUTA
// ======================

function suavizarRuta(puntos){
    let nueva=[];
    for(let i=0;i<puntos.length-1;i++){
        let p1=puntos[i];
        let p2=puntos[i+1];
        for(let t=0;t<=1;t+=0.03){
            nueva.push(L.latLng(
                p1.lat+(p2.lat-p1.lat)*t,
                p1.lng+(p2.lng-p1.lng)*t
            ));
        }
    }
    return nueva;
}

function planificarRutaOptima(){
    if(!posicionActual){
        alert("Primero marca tu posición actual");
        return;
    }

    let puertos = datosPersonal.filter(d => d.tipo === 'port');
    if(puertos.length < 1){
        alert("Necesitas al menos 1 puerto marcado");
        return;
    }

    // Encontrar el puerto más cercano desde la posición actual
    let mejorPuerto = null;
    let menorDistancia = Infinity;

    puertos.forEach(puerto => {
        let dist = map.distance(posicionActual, puerto.latlng);
        if(dist < menorDistancia){
            menorDistancia = dist;
            mejorPuerto = puerto;
        }
    });

    if(mejorPuerto){
        let rutaOptima = [posicionActual, mejorPuerto.latlng];
        rutasPersonal.push(rutaOptima.map(p => ({lat: p.lat, lng: p.lng})));
        guardar();

        let rutaLayer = L.polyline(rutaOptima, {color: 'green', weight: 4}).addTo(capaRutas);
        rutasDibujadas.push(rutaLayer);

        alert(`Ruta óptima planificada desde tu posición a ${mejorPuerto.nombre} (distancia: ${menorDistancia.toFixed(0)} unidades)`);
    }
}

function rutaSegura(){
    if(!posicionActual){
        alert("Primero marca tu posición actual");
        return;
    }

    let puertos = datosPersonal.filter(d => d.tipo === 'port');
    if(puertos.length < 1 || zonasPersonal.length === 0){
        alert("Necesitas puertos marcados y zonas peligrosas");
        return;
    }

    // Encontrar el puerto más cercano que no cruce zonas
    let mejorPuerto = null;
    let menorIntersecciones = Infinity;

    puertos.forEach(puerto => {
        let line = turf.lineString([[posicionActual.lng, posicionActual.lat], [puerto.latlng.lng, puerto.latlng.lat]]);
        let intersecciones = 0;

        zonasPersonal.forEach(zona => {
            let polyCoords = zona.map(p => [p.lng, p.lat]);
            polyCoords.push(polyCoords[0]);
            let polygon = turf.polygon([polyCoords]);
            if(turf.booleanIntersects(line, polygon)){
                intersecciones++;
            }
        });

        if(intersecciones < menorIntersecciones){
            menorIntersecciones = intersecciones;
            mejorPuerto = puerto;
        }
    });

    if(mejorPuerto && menorIntersecciones === 0){
        let rutaSegura = [posicionActual, mejorPuerto.latlng];
        rutasPersonal.push(rutaSegura.map(p => ({lat: p.lat, lng: p.lng})));
        guardar();

        let rutaLayer = L.polyline(rutaSegura, {color: 'yellow', weight: 4}).addTo(capaRutas);
        rutasDibujadas.push(rutaLayer);

        alert(`Ruta segura planificada desde tu posición a ${mejorPuerto.nombre}`);
    } else if(mejorPuerto){
        alert(`No hay ruta completamente segura. La mejor opción a ${mejorPuerto.nombre} cruza ${menorIntersecciones} zona(s).`);
    } else {
        alert("No se pudo encontrar una ruta segura.");
    }
}

function calcularTiempo(){
    if(rutasPersonal.length === 0){
        alert("No hay rutas guardadas");
        return;
    }

    let ruta = rutasPersonal[rutasPersonal.length - 1];
    let distanciaTotal = 0;

    for(let i = 0; i < ruta.length - 1; i++){
        let p1 = L.latLng(ruta[i].lat, ruta[i].lng);
        let p2 = L.latLng(ruta[i+1].lat, ruta[i+1].lng);
        distanciaTotal += map.distance(p1, p2);
    }

    // Estimar tiempo: asumir velocidad promedio de 10 km/h en el juego
    let tiempoHoras = distanciaTotal / 10000; // Ajustar escala
    alert(`Distancia total: ${distanciaTotal.toFixed(0)} unidades\nTiempo estimado: ${tiempoHoras.toFixed(1)} horas`);
}

// ======================
// EXPORTAR
// ======================

function exportarDatos(){
    var data={marcas:datosPersonal,rutas:rutasPersonal,zonas:zonasPersonal};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="mapa_personal_wsb.json";
    a.click();
}

// ======================
// UTILIDADES
// ======================

function togglePersonal(){
    if(map.hasLayer(capaPersonal)) map.removeLayer(capaPersonal);
    else map.addLayer(capaPersonal);
}

function resetPersonal(){
    if(confirm("Seguro? Esto borrará todas las marcas, rutas, zonas y posición del usuario actual.")){
        localStorage.removeItem('wsb_' + usuarioActual + '_personal_v2');
        localStorage.removeItem('wsb_' + usuarioActual + '_rutas_v2');
        localStorage.removeItem('wsb_' + usuarioActual + '_zonas_v2');
        localStorage.removeItem('wsb_' + usuarioActual + '_posicion');
        location.reload();
    }
}

// Cargar puertos desde JSON
fetch('puertos.json')
    .then(response => response.json())
    .then(data => {
        data.forEach(puerto => {
            // Agregar como marca si no existe
            let existe = datosPersonal.some(d => d.nombre === puerto.puerto);
            if(!existe){
                let marca = {
                    tipo: 'port',
                    nombre: puerto.puerto,
                    latlng: L.latLng(puerto.y, puerto.x), // Nota: y,x en lugar de lat,lng
                    compra: puerto.precio,
                    venta: puerto.precio + 20, // Estimado
                    riesgo: 'Medio',
                    nota: `Carga: ${puerto.carga}`
                };
                datosPersonal.push(marca);
                dibujarMarca(marca, datosPersonal.length - 1);
            }
        });
        guardar();
    })
    .catch(err => console.log('No se pudo cargar puertos.json', err));

</script>
</body>
</html>
