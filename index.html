<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrategia Naval - Gremio WSB</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #0d0d0d; font-family: 'Courier New', monospace; color: #f1c40f; }
        #map { height: 100vh; width: 100%; background: #1a1a1a; cursor: crosshair; }
        .ui-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(15, 15, 15, 0.9); border: 2px solid #f1c40f;
            padding: 15px; border-radius: 8px; max-width: 200px;
        }
        .section-title { border-bottom: 1px solid #f1c40f; margin-bottom: 10px; font-size: 14px; font-weight: bold; }
        .boton-ui {
            background: transparent; color: #f1c40f; border: 1px solid #f1c40f;
            padding: 5px; cursor: pointer; width: 100%; margin-bottom: 5px; font-size: 11px;
        }
        .boton-ui:hover { background: #f1c40f; color: black; }
        .port-card { text-align: center; min-width: 140px; color: #f1c40f; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div class="section-title">⚓ DATOS DEL GREMIO</div>
        <p style="font-size: 10px;">Sincronizado vía JSON</p>
        <div class="section-title" style="margin-top:15px;">📜 MI BITÁCORA</div>
        <button class="boton-ui" onclick="togglePersonal()">VER/OCULTAR MIS PUNTOS</button>
        <button class="boton-ui" style="color:#e74c3c;" onclick="borrarTodo()">RESETEAR MAPA</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { crs: L.CRS.Simple, minZoom: -1 });
        var bounds = [[0, 0], [1500, 2000]];
        L.imageOverlay('mapa_juego.jpg', bounds).addTo(map);
        map.fitBounds(bounds);

        var capaGremio = L.layerGroup().addTo(map);
        var capaPersonal = L.layerGroup().addTo(map);

        var iconoGremio = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2942/2942023.png',
            iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30]
        });

        // CARGA INSTANTÁNEA (Evita el caché de GitHub)
        fetch('puertos.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => {
                data.forEach(p => {
                    L.marker([p.x, p.y], {icon: iconoGremio}).addTo(capaGremio)
                     .bindPopup(`
                        <div class="port-card">
                            <h3>${p.puerto}</h3>
                            <p>📦 <b>Carga:</b> ${p.carga}</p>
                            <p>💰 <b>Precio:</b> ${p.precio} pz</p>
                        </div>
                     `);
                });
            });

        // CLIC IZQUIERDO: Coordenadas
        var coordPopup = L.popup();
        map.on('click', function(e) {
            coordPopup.setLatLng(e.latlng)
                .setContent("X: " + e.latlng.lat.toFixed(0) + " | Y: " + e.latlng.lng.toFixed(0))
                .openOn(map);
        });

        // BITÁCORA PERSONAL (Clic Derecho)
        var misPuntos = JSON.parse(localStorage.getItem('puntos_personales_wsb')) || [];
        function cargarPersonales() {
            misPuntos.forEach((p, i) => dibujarPuntoPersonal(p.latlng, p.nota, i));
        }

        function dibujarPuntoPersonal(latlng, nota, id) {
            L.marker(latlng, { draggable: true }).addTo(capaPersonal)
             .bindPopup(`<b>${nota}</b><br><button onclick="location.reload();">Borrar punto (F5)</button>`);
        }

        map.on('contextmenu', e => {
            let n = prompt("Nombre:");
            if(n) {
                misPuntos.push({latlng: e.latlng, nota: n});
                localStorage.setItem('puntos_personales_wsb', JSON.stringify(misPuntos));
                dibujarPuntoPersonal(e.latlng, n, misPuntos.length-1);
            }
        });

        function togglePersonal() {
            if (map.hasLayer(capaPersonal)) map.removeLayer(capaPersonal);
            else map.addLayer(capaPersonal);
        }

        function borrarTodo() {
            localStorage.removeItem('puntos_personales_wsb');
            location.reload();
        }

        cargarPersonales();
    </script>
</body>
</html>
