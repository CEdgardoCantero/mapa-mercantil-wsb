<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Guerra WSB</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #000b1a; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 1. FONDO DE AGUA ANIMADA */
        .ocean-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #002d4d 0%, #000b1a 100%);
            z-index: -1;
        }

        .waves {
            position: absolute; width: 200%; height: 200%;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            opacity: 0.3;
            animation: waterFlow 30s linear infinite;
        }

        @keyframes waterFlow {
            from { transform: translate(-25%, -25%) rotate(0deg); }
            to { transform: translate(0%, 0%) rotate(5deg); }
        }

        /* 2. EL CONTENEDOR DE PERSPECTIVA (La clave) */
        #war-room {
            perspective: 1200px; /* Fuerza la profundidad */
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        #map-table {
            width: 85vw; height: 80vh;
            background: #2c1e16;
            border: 15px solid #3d2b1f;
            box-shadow: 0 80px 100px rgba(0,0,0,0.9), inset 0 0 50px rgba(0,0,0,0.5);
            /* INCLINACIÓN REAL */
            transform: rotateX(35deg) rotateZ(-1deg); 
            transform-style: preserve-3d;
            position: relative;
        }

        #map { width: 100%; height: 100%; background: transparent; }

        /* 3. PANEL UI FLOTANTE (Sin inclinación para leer bien) */
        .ui-panel {
            position: absolute; top: 20px; right: 20px; z-index: 9999;
            background: rgba(15, 12, 8, 0.9); border: 2px solid #b8860b;
            padding: 15px; color: #f1c40f; font-family: 'Courier New', monospace;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .boton-ui {
            background: #2a1f14; color: #f1c40f; border: 1px solid #b8860b;
            padding: 8px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold;
        }

        /* Corregir popups para que se vean rectos */
        .leaflet-popup-content-wrapper { transform: rotateX(-30deg); }
    </style>
</head>
<body>

    <div class="ocean-bg"><div class="waves"></div></div>

    <div id="war-room">
        <div class="ui-panel">
            <div style="text-align:center; font-weight:bold; border-bottom: 1px solid #b8860b;">ESTRATEGIA NAVAL</div>
            <button class="boton-ui" onclick="borrarTodo()">LIMPIAR MESA</button>
            <div id="coords" style="font-size: 10px; margin-top:10px; text-align:center;">X: 0 | Y: 0</div>
        </div>

        <div id="map-table">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicialización normal
        var map = L.map('map', { 
            crs: L.CRS.Simple, 
            minZoom: -1,
            attributionControl: false 
        });

        var bounds = [[0, 0], [1500, 2000]];
        L.imageOverlay('mapa_juego.jpg', bounds).addTo(map);
        map.fitBounds(bounds);

        // Catálogo de iconos
        var iconos = {
            puerto: "https://cdn-icons-png.flaticon.com/512/2942/2942023.png",
            peligro: "https://cdn-icons-png.flaticon.com/512/564/564619.png"
        };

        var puntos = JSON.parse(localStorage.getItem('mapa_wsb_3d_final')) || [];

        function render() {
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
            puntos.forEach((p, i) => {
                var ic = L.icon({ iconUrl: iconos[p.t], iconSize: [30, 30], iconAnchor: [15, 30] });
                L.marker(p.l, {icon: ic, draggable: true}).addTo(map)
                .bindPopup(`<b>${p.n}</b><br><button onclick="eliminar(${i})">X</button>`)
                .on('dragend', e => {
                    puntos[i].l = e.target.getLatLng();
                    localStorage.setItem('mapa_wsb_3d_final', JSON.stringify(puntos));
                });
            });
        }

        map.on('contextmenu', e => {
            var n = prompt("Nombre:");
            if(n) {
                puntos.push({l:e.latlng, t:'puerto', n:n});
                localStorage.setItem('mapa_wsb_3d_final', JSON.stringify(puntos));
                render();
            }
        });

        function eliminar(id) {
            puntos.splice(id, 1);
            localStorage.setItem('mapa_wsb_3d_final', JSON.stringify(puntos));
            render();
        }

        function borrarTodo() {
            if(confirm("¿Limpiar?")) { puntos=[]; localStorage.clear(); render(); }
        }

        map.on('mousemove', e => {
            document.getElementById('coords').innerHTML = `X: ${e.latlng.lat.toFixed(0)} | Y: ${e.latlng.lng.toFixed(0)}`;
        });

        render();
    </script>
</body>
</html>
