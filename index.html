<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartografía Naval - WSB</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #0d0d0d; font-family: 'Courier New', monospace; }
        #map { height: 100vh; width: 100%; background: #1a1a1a; }
        
        /* Panel de Control */
        .ui-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(20, 20, 20, 0.9); border: 2px solid #f1c40f;
            padding: 15px; color: #f1c40f; border-radius: 5px;
        }

        .port-card { text-align: center; color: #f1c40f; }
        .boton-ui {
            background: #f1c40f; color: black; border: none;
            padding: 5px 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px;
        }
        .boton-borrar { background: #e74c3c; color: white; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h3>MI BITÁCORA</h3>
        <p><small>Click derecho para añadir punto</small></p>
        <button class="boton-ui boton-borrar" onclick="borrarTodo()">RESETEAR MAPA</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. CONFIGURACIÓN DEL MAPA
        var map = L.map('map', { crs: L.CRS.Simple, minZoom: -1 });
        var bounds = [[0, 0], [1500, 2000]];
        L.imageOverlay('mapa_juego.jpg', bounds).addTo(map);
        map.fitBounds(bounds);

        // 2. DEFINICIÓN DE ICONOS
        var iconos = {
            puerto: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2942/2942023.png', iconSize: [30, 30], iconAnchor: [15, 30] }),
            tesoro: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/4150/4150371.png', iconSize: [30, 30], iconAnchor: [15, 30] }),
            peligro: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/564/564619.png', iconSize: [30, 30], iconAnchor: [15, 30] })
        };

        // 3. SISTEMA DE GUARDADO (Local Storage)
        var marcadoresGuardados = JSON.parse(localStorage.getItem('misPuntosWSB')) || [];

        // Cargar puntos previos al iniciar
        marcadoresGuardados.forEach(data => {
            crearMarcador(data.latlng, data.tipo, data.nota, false);
        });

        function guardarEnMemoria() {
            var datos = [];
            map.eachLayer(function(layer) {
                if (layer instanceof L.Marker && layer.options.tipo) {
                    datos.push({
                        latlng: layer.getLatLng(),
                        tipo: layer.options.tipo,
                        nota: layer.getPopup().getContent().split('value="')[1]?.split('"')[0] || ""
                    });
                }
            });
            localStorage.setItem('misPuntosWSB', JSON.stringify(datos));
        }

        // 4. CREAR MARCADORES
        function crearMarcador(latlng, tipo, nota = "", guardar = true) {
            var m = L.marker(latlng, { 
                icon: iconos[tipo], 
                draggable: true,
                tipo: tipo 
            }).addTo(map);

            var popupContent = `
                <div class="port-card">
                    <strong style="text-transform: uppercase;">${tipo}</strong><br>
                    <input type="text" id="nota-${m._leaflet_id}" value="${nota}" placeholder="Nombre/Nota..." 
                           style="background:#000; color:#f1c40f; border:1px solid #f1c40f; margin-top:5px; padding:3px;">
                    <button class="boton-ui" onclick="borrarMarcador(${m._leaflet_id})">ELIMINAR</button>
                </div>
            `;

            m.bindPopup(popupContent);
            
            // Eventos para guardar cambios
            m.on('dragend', guardarEnMemoria);
            m.on('popupclose', guardarEnMemoria);
            
            if(guardar) guardarEnMemoria();
            return m;
        }

        // 5. MENÚ CLIC DERECHO (Interacción)
        map.on('contextmenu', function(e) {
            var tempPopup = L.popup()
                .setLatLng(e.latlng)
                .setContent(`
                    <div class="port-card">
                        <b>AÑADIR A BITÁCORA</b><br>
                        <button class="boton-ui" onclick="colocar('puerto', ${e.latlng.lat}, ${e.latlng.lng})">⚓ PUERTO</button>
                        <button class="boton-ui" onclick="colocar('tesoro', ${e.latlng.lat}, ${e.latlng.lng})">💰 TESORO/NAUFRAGIO</button>
                        <button class="boton-ui" onclick="colocar('peligro', ${e.latlng.lat}, ${e.latlng.lng})">💀 PELIGRO</button>
                    </div>
                `)
                .openOn(map);
        });

        function colocar(tipo, lat, lng) {
            map.closePopup();
            crearMarcador([lat, lng], tipo);
        }

        function borrarMarcador(id) {
            map.eachLayer(function(layer) {
                if (layer._leaflet_id === id) map.removeLayer(layer);
            });
            guardarEnMemoria();
        }

        function borrarTodo() {
            if(confirm("¿Seguro que quieres borrar todo tu mapa personal?")) {
                localStorage.removeItem('misPuntosWSB');
                location.reload();
            }
        }
    </script>
</body>
</html>
