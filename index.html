<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Guerra - Gremio WSB</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 1. Fondo de Agua Animada (Capa inferior) */
        body { 
            margin: 0; padding: 0; 
            background-color: #001a2d;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .ocean {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: url('https://www.transparenttextures.com/patterns/dark-matter.png'), 
                        linear-gradient(45deg, #001a2d 25%, #002b4d 50%, #001a2d 75%);
            background-size: 200px 200px, 400% 400%;
            animation: moveWater 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes moveWater {
            0% { background-position: 0 0, 0% 50%; }
            50% { background-position: 100px 100px, 100% 50%; }
            100% { background-position: 0 0, 0% 50%; }
        }

        /* 2. Contenedor de Perspectiva */
        #viewport {
            perspective: 1500px;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. El Mapa Inclinado */
        #map-frame {
            width: 80vw;
            height: 80vh;
            transform: rotateX(25deg) rotateZ(-2deg); /* LA MAGIA 3D */
            box-shadow: 0 50px 80px rgba(0,0,0,0.9), 0 0 20px rgba(184, 134, 11, 0.2);
            border: 12px solid #2c1e16;
            border-radius: 4px;
            background: #1a1a1a;
            position: relative;
        }

        #map { height: 100%; width: 100%; background: transparent; }

        /* Panel de Control */
        .ui-panel {
            position: absolute; top: 20px; right: 20px; z-index: 2000;
            background: rgba(15, 12, 8, 0.95); border: 2px solid #b8860b;
            padding: 15px; color: #f1c40f; font-family: 'Courier New', monospace;
            box-shadow: 0 0 15px black;
        }

        .boton-ui {
            background: #2a1f14; color: #f1c40f; border: 1px solid #b8860b;
            padding: 8px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold;
        }
        .boton-ui:hover { background: #b8860b; color: black; }

    </style>
</head>
<body>

    <div class="ocean"></div>

    <div id="viewport">
        <div class="ui-panel">
            <div style="text-align:center; font-weight:bold; border-bottom: 1px solid #b8860b;">WSB STRATEGY</div>
            <button class="boton-ui" onclick="borrarTodo()">RESETEAR MESA</button>
            <div id="coordenadas" style="font-size: 10px; margin-top:10px; text-align:center;">X: 0 | Y: 0</div>
        </div>

        <div id="map-frame">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { 
            crs: L.CRS.Simple, 
            minZoom: -1,
            zoomSnap: 0.1,
            attributionControl: false 
        });

        var bounds = [[0, 0], [1500, 2000]];
        L.imageOverlay('mapa_juego.jpg', bounds).addTo(map);
        map.fitBounds(bounds);

        // Iconos
        var catalogo = {
            peligro: { n: "Zona Peligrosa", i: "https://cdn-icons-png.flaticon.com/512/564/564619.png" },
            puerto: { n: "Puerto", i: "https://cdn-icons-png.flaticon.com/512/2942/2942023.png" }
        };

        var misPuntos = JSON.parse(localStorage.getItem('mapa_wsb_3d_v1')) || [];

        function renderizar() {
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
            misPuntos.forEach((p, idx) => {
                var icono = L.icon({ iconUrl: catalogo[p.t].i, iconSize: [30, 30], iconAnchor: [15, 30] });
                L.marker(p.l, {icon: icono, draggable: true}).addTo(map)
                .bindPopup(`<b>${p.n}</b><br><button onclick="eliminar(${idx})">Quitar</button>`)
                .on('dragend', function(e) {
                    misPuntos[idx].l = e.target.getLatLng();
                    localStorage.setItem('mapa_wsb_3d_v1', JSON.stringify(misPuntos));
                });
            });
        }

        map.on('contextmenu', e => {
            var html = `<div style="color:black"><b>Marcar:</b><br>`;
            for(var k in catalogo) {
                html += `<button onclick="crear('${k}',${e.latlng.lat},${e.latlng.lng})" style="width:100%; margin:2px 0;">${catalogo[k].n}</button>`;
            }
            L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
        });

        function crear(t, lat, lng) {
            var n = prompt("Nombre:", catalogo[t].n);
            if(n) {
                misPuntos.push({l:[lat,lng], t:t, n:n});
                localStorage.setItem('mapa_wsb_3d_v1', JSON.stringify(misPuntos));
                renderizar();
            }
            map.closePopup();
        }

        function eliminar(id) {
            misPuntos.splice(id, 1);
            localStorage.setItem('mapa_wsb_3d_v1', JSON.stringify(misPuntos));
            renderizar();
        }

        function borrarTodo() {
            if(confirm("¿Limpiar mesa?")) { misPuntos = []; localStorage.removeItem('mapa_wsb_3d_v1'); renderizar(); }
        }

        map.on('mousemove', e => {
            document.getElementById('coordenadas').innerHTML = `X: ${e.latlng.lat.toFixed(0)} | Y: ${e.latlng.lng.toFixed(0)}`;
        });

        renderizar();
    </script>
</body>
</html>
